<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firebase Explorer Wireframe</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="titlebar">
        <div class="window-controls" aria-hidden="true">
          <span class="window-dot close"></span>
          <span class="window-dot min"></span>
          <span class="window-dot max"></span>
        </div>
        <div class="history-controls" aria-label="Navigation history">
          <button class="icon-btn" data-action="history-back" title="Back"><span data-icon="arrowLeft"></span></button>
          <button class="icon-btn" data-action="history-forward" title="Forward"><span data-icon="arrowRight"></span></button>
        </div>
        <button class="icon-btn shell-sidebar-toggle" data-action="toggle-sidebar" title="Toggle workspace tree (Cmd/Ctrl+B)"><span data-icon="database"></span></button>
        <div class="brand">
          <span class="brand-mark" data-icon="database"></span>
          <strong>Firebase Explorer</strong>
          <span class="tag">HTML wireframe</span>
        </div>
        <div class="top-actions">
          <button class="btn" data-action="open-settings" title="Open settings"><span data-icon="settings"></span>Settings</button>
          <button class="btn primary" data-action="show-add-account" title="Add account"><span data-icon="plus"></span>Add account</button>
          <div class="segmented" aria-label="Theme">
            <button data-action="set-theme" data-theme-value="light" title="Light theme"><span data-icon="sun"></span></button>
            <button data-action="set-theme" data-theme-value="dark" title="Dark theme"><span data-icon="moon"></span></button>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-rail" id="sidebarRail"></div>
          <div class="sidebar-head">
            <div class="sidebar-title">
              <strong>Workspace Tree</strong>
              <span class="badge mock">mock</span>
              <button class="icon-btn sidebar-collapse" data-action="toggle-sidebar" title="Collapse workspace tree (Cmd/Ctrl+B)"><span data-icon="arrowLeft"></span></button>
            </div>
            <label class="tree-filter">
              <span data-icon="search"></span>
              <input id="treeFilter" placeholder="Filter tree (Cmd/Ctrl+K)" />
            </label>
          </div>
          <div class="tree" id="tree"></div>
        </aside>
        <div class="splitter splitter-sidebar" data-action="resize-sidebar" role="separator" aria-orientation="vertical" title="Drag to resize sidebar"></div>
        <button class="sidebar-scrim" data-action="close-sidebar" aria-label="Close workspace tree"></button>

        <section class="workspace">
          <div class="tabs" id="tabs"></div>
          <div class="tab-toolbar" id="tabToolbar"></div>
          <div class="content" id="content"></div>
        </section>
      </main>

      <footer class="statusbar" id="statusbar"></footer>
    </div>

    <div class="modal-backdrop" id="accountModal" role="dialog" aria-modal="true" aria-label="Add account">
      <div class="modal">
        <div class="modal-head">
          <strong>Add Firebase Account</strong>
          <button class="icon-btn" data-action="hide-add-account" title="Close"><span data-icon="x"></span></button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <label for="projectName">Display name</label>
            <input class="field-input" id="projectName" value="New Client Dev" />
          </div>
          <div class="form-row">
            <label for="projectTarget">Target</label>
            <select id="projectTarget">
              <option>Mock service account</option>
              <option>Local emulator</option>
              <option>Production service account</option>
            </select>
          </div>
          <div class="drop-zone">
            <div>
              <strong>service-account.json</strong>
              <div class="small">Drop/select placeholder for final desktop app</div>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <span class="muted small">Wireframe only. No credentials are read.</span>
          <div>
            <button class="btn" data-action="hide-add-account">Cancel</button>
            <button class="btn primary" data-action="add-mock-account"><span data-icon="plus"></span>Add mock</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="documentModal" role="dialog" aria-modal="true" aria-label="Edit document"></div>
    <div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-label="Confirm action"></div>
    <div class="modal-backdrop" id="hotkeyHelpModal" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts"></div>
    <div id="contextMenu"></div>

    <template id="template-tree-account">
      <div class="tree-section">
        <button class="tree-row {{activeClass}}" data-action="open-project" data-account-id="{{accountId}}">
          <span class="chevron {{openClass}}" data-action="toggle-account" data-account-id="{{accountId}}" data-icon="chevron"></span>
          <span data-icon="database"></span>
          <span class="label">{{name}}</span>
          <span class="meta">{{projectId}}</span>
          <span class="icon-btn tree-account-remove" data-action="remove-account" data-account-id="{{accountId}}" title="Remove account"><span data-icon="trash"></span></span>
        </button>
        {{{tools}}}
      </div>
    </template>

    <template id="template-tree-load-error">
      <div class="tree-load-state error">
        <span>Failed to load workspace tools for {{accountName}}.</span>
        <button class="btn" data-action="retry-account-load" data-account-id="{{accountId}}"><span data-icon="refresh"></span>Retry</button>
      </div>
    </template>

    <template id="template-tree-load-idle">
      <div class="tree-load-state"><span>Expand account to load tools.</span></div>
    </template>

    <template id="template-tree-tools">
      <div class="tree-children">
        <button class="tree-row depth-1" data-action="toggle-firestore" data-account-id="{{accountId}}">
          <span class="chevron {{firestoreOpenClass}}" data-icon="chevron"></span>
          <span data-icon="folder"></span>
          <span class="label">Firestore</span>
          <span class="meta">{{firestoreMeta}}</span>
          <span class="icon-btn tree-refresh" data-action="refresh-firestore" data-account-id="{{accountId}}" title="Refresh collections"><span data-icon="refresh"></span></span>
        </button>
        {{{collectionRows}}}
        <button class="tree-row depth-1 {{authActiveClass}}" data-action="open-auth" data-account-id="{{accountId}}">
          <span data-icon="users"></span><span class="label">Authentication</span><span class="meta">users</span>
        </button>
        <button class="tree-row depth-1 {{scriptActiveClass}}" data-action="open-script" data-account-id="{{accountId}}">
          <span data-icon="code"></span><span class="label">JavaScript Query</span><span class="meta">SDK</span>
        </button>
      </div>
    </template>

    <template id="template-tree-collection">
      <button class="tree-row depth-2 {{activeClass}}" data-action="open-query" data-account-id="{{accountId}}" data-collection="{{collectionName}}">
        <span data-icon="folder"></span><span class="label">{{collectionName}}</span><span class="meta">{{count}}</span>
      </button>
    </template>

    <template id="template-tab">
      <button class="tab {{activeClass}}" data-action="activate-tab" data-tab-id="{{tabId}}" draggable="true">
        <span class="tab-main"><span data-icon="{{icon}}"></span><span class="tab-title">{{title}}</span><span class="tab-subtitle">{{subtitle}}</span></span>
        <span class="tab-close" data-action="close-tab" data-tab-id="{{tabId}}" title="Close"><span data-icon="x"></span></span>
      </button>
    </template>

    <template id="template-toolbar-empty">
      <div class="toolbar-title"><span data-icon="database"></span><span>No open tabs</span></div>
    </template>

    <template id="template-toolbar">
      <div class="toolbar-title"><span data-icon="{{icon}}"></span><span>{{title}}</span>{{{badge}}}</div>
      <div class="toolbar-spacer"></div>
      <select class="account-select" data-action="change-tab-account" data-tab-id="{{tabId}}">
        {{{accountOptions}}}
      </select>
      <button class="icon-btn" data-action="refresh-tab" title="Refresh"><span data-icon="refresh"></span></button>
    </template>

    <template id="template-empty-state">
      <div class="empty-state">
        <div><strong>{{title}}</strong><span>{{message}}</span></div>
      </div>
    </template>

    <template id="template-detail-item">
      <div class="detail-item"><span>{{label}}</span><span>{{value}}</span></div>
    </template>

    <template id="template-statusbar">
      <span>{{status}}</span>
      <span>Selected: {{selectedTreeKey}}</span>
      <span>Tab account: {{accountName}}</span>
      <div class="right"><span>{{tabCount}} tabs</span><span>Theme: {{theme}}</span></div>
    </template>

    <template id="template-context-menu">
      <div class="context-menu" style="left:{{x}}px; top:{{y}}px;">{{{items}}}</div>
    </template>

    <template id="template-confirm-modal">
      <div class="modal confirm-dialog">
        <div class="modal-head">
          <strong>{{title}}</strong>
          <button class="icon-btn" data-action="cancel-confirm" title="Close"><span data-icon="x"></span></button>
        </div>
        <div class="modal-body">
          <p>{{message}}</p>
        </div>
        <div class="modal-foot">
          <span class="muted small"></span>
          <div>
            <button class="btn" data-action="cancel-confirm">Cancel</button>
            <button class="btn danger" data-action="accept-confirm">{{confirmLabel}}</button>
          </div>
        </div>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
