version: 2
updates:
  - package-ecosystem: "npm" # pnpm uses the 'npm' ecosystem in Dependabot
    directory: "/"           # Target the root where the lockfile resides
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:                  # Recommended to avoid PR fatigue in monorepos
      dependencies:
        patterns:
          - "*"
