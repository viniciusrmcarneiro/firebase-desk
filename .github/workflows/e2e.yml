name: e2e

on:
    workflow_dispatch:
    pull_request:
        branches: [ main ]

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            GCLOUD_PROJECT: demo-local
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 21
            - run: pnpm install --frozen-lockfile
            - name: Install Electron runtime deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64
            - run: pnpm build
            - run: pnpm --filter @firebase-desk/e2e exec playwright install --with-deps
                  chromium
            - run: xvfb-run --auto-servernum -- pnpm dlx firebase-tools@15.15.0 --project
                  demo-local emulators:exec --only auth,firestore --config
                  firebase/emulator/firebase.json "pnpm --filter
                  @firebase-desk/emulator-tools seed && pnpm --filter
                  @firebase-desk/e2e test:e2e"
            - if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report
                  path: |
                      e2e/playwright-report
                      e2e/test-results
