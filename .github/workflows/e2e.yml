name: e2e

on:
    workflow_dispatch:
    pull_request:
        branches: [ main ]

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            GCLOUD_PROJECT: demo-local
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm --filter @firebase-desk/e2e exec playwright install --with-deps
                  chromium
            - run: pnpm dlx firebase-tools@15.15.0 --project demo-local emulators:exec --only
                  auth,firestore --config firebase/emulator/firebase.json "pnpm
                  --filter @firebase-desk/emulator-tools seed && pnpm --filter
                  @firebase-desk/e2e test:e2e"
            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      e2e/playwright-report
                      e2e/test-results
