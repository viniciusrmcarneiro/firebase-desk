name: release

on:
    workflow_dispatch:
    push:
        branches: [ main ]
        tags:
            - "v*.*.*"
    pull_request:
        branches: [ main ]
        types: [ opened, synchronize, reopened, labeled, unlabeled ]

permissions:
    contents: read

jobs:
    prepare:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            matrix: ${{ steps.plan.outputs.matrix }}
            release_channel: ${{ steps.plan.outputs.release_channel }}
            retention_days: ${{ steps.plan.outputs.retention_days }}
            should_package: ${{ steps.plan.outputs.should_package }}
            version_tag: ${{ steps.plan.outputs.version_tag }}
        steps:
            - uses: actions/github-script@v8
              id: plan
              with:
                  script: |
                      const allPlatforms = [
                          { os: 'ubuntu-latest', platform: 'linux', smoke: 'packaged' },
                          { os: 'macos-latest', platform: 'macos', smoke: 'packaged' },
                          { os: 'windows-latest', platform: 'windows', smoke: 'packaged' },
                      ];

                      const packagePathPrefixes = [
                          'apps/desktop/',
                          'docker/',
                          'e2e/',
                      ];
                      const packagePaths = new Set([
                          '.dockerignore',
                          '.github/workflows/ci.yml',
                          '.github/workflows/release.yml',
                          '.github/workflows/release-gate.yml',
                          'package.json',
                          'pnpm-lock.yaml',
                          'scripts/check-release-version.ts',
                          'scripts/generate-icons.mjs',
                          'scripts/package-desktop.mjs',
                          'scripts/package-linux-docker.sh',
                          'scripts/write-package-manager-manifests.ts',
                          'scripts/write-package-checksums.mjs',
                          'scripts/write-release-manifest.ts',
                      ]);

                      const eventName = context.eventName;
                      const ref = context.ref;
                      let releaseChannel = `dispatch-${context.runId}`;
                      let retentionDays = '14';
                      let includeAllPlatforms = eventName === 'workflow_dispatch';
                      let shouldPackage = true;
                      let versionTag = '';

                      if (eventName === 'pull_request') {
                          const pullRequest = context.payload.pull_request;
                          releaseChannel = `pr-${pullRequest.number}`;
                          const labels = pullRequest.labels.map((label) => label.name);
                          const hasPackageAllLabel = labels.includes('package-all');
                          const files = await github.paginate(github.rest.pulls.listFiles, {
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              pull_number: pullRequest.number,
                              per_page: 100,
                          });
                          const touchesPackagePaths = files.some((file) => {
                              return packagePaths.has(file.filename)
                                  || packagePathPrefixes.some((prefix) => file.filename.startsWith(prefix));
                          });
                          includeAllPlatforms = hasPackageAllLabel || touchesPackagePaths;
                          core.info(`PR package-all label: ${hasPackageAllLabel}`);
                          core.info(`PR touches package paths: ${touchesPackagePaths}`);
                      } else if (eventName === 'push' && ref === 'refs/heads/main') {
                          retentionDays = '90';
                          includeAllPlatforms = true;
                          async function desktopVersionAt(ref) {
                              const response = await github.rest.repos.getContent({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  path: 'apps/desktop/package.json',
                                  ref,
                              });
                              if (!('content' in response.data)) {
                                  throw new Error('apps/desktop/package.json is not a file.');
                              }
                              return JSON.parse(
                                  Buffer.from(response.data.content, 'base64').toString('utf8'),
                              ).version;
                          }
                          const headVersion = await desktopVersionAt(context.sha);
                          versionTag = `v${headVersion}`;
                          releaseChannel = versionTag;

                          const before = context.payload.before;
                          if (before && !/^0+$/.test(before)) {
                              const beforeVersion = await desktopVersionAt(before);
                              shouldPackage = beforeVersion !== headVersion;
                              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  basehead: `${before}...${context.sha}`,
                              });
                              const files = comparison.data.files ?? [];
                              const touchedDesktopPackage = files.some((file) => {
                                  return file.filename === 'apps/desktop/package.json';
                              });
                              core.info(`Desktop package changed: ${touchedDesktopPackage}`);
                              core.info(`Desktop version: ${beforeVersion} -> ${headVersion}`);
                          }
                      } else if (eventName === 'push' && ref.startsWith('refs/tags/')) {
                          releaseChannel = ref.replace('refs/tags/', '');
                          versionTag = releaseChannel;
                          retentionDays = '90';
                          includeAllPlatforms = true;
                      }

                      const matrix = {
                          include: includeAllPlatforms ? allPlatforms : [allPlatforms[0]],
                      };

                      core.info(`Release channel: ${releaseChannel}`);
                      core.info(`Version tag: ${versionTag}`);
                      core.info(`Retention days: ${retentionDays}`);
                      core.info(`Package matrix: ${JSON.stringify(matrix)}`);
                      core.info(`Should package: ${shouldPackage}`);
                      core.setOutput('matrix', JSON.stringify(matrix));
                      core.setOutput('release_channel', releaseChannel);
                      core.setOutput('retention_days', retentionDays);
                      core.setOutput('should_package', String(shouldPackage));
                      core.setOutput('version_tag', versionTag);

    ci:
        uses: ./.github/workflows/ci.yml

    package:
        needs: [ prepare, ci ]
        if: needs.prepare.outputs.should_package == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
        env:
            GCLOUD_PROJECT: demo-local
            RELEASE_TAG: ${{ needs.prepare.outputs.version_tag }}
            RELEASE_CHANNEL: ${{ needs.prepare.outputs.release_channel }}
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.2
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: actions/setup-java@v5
              if: matrix.smoke == 'packaged'
              with:
                  distribution: temurin
                  java-version: 21
            - name: Install Electron runtime deps
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libgtk-3-0 libsecret-1-0 libnotify4 libxss1 libxtst6 xdg-utils
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:release-version
            - run: pnpm package
            - name: Resolve package names
              id: package_names
              shell: bash
              env:
                  PACKAGE_PLATFORM: ${{ matrix.platform }}
              run: |
                  echo "artifact=firebase-desk-${RELEASE_CHANNEL}-${PACKAGE_PLATFORM}-${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"
                  echo "checksums=SHA256SUMS-${RELEASE_CHANNEL}-${PACKAGE_PLATFORM}-${RUNNER_ARCH}.txt" >> "$GITHUB_OUTPUT"
            - run: pnpm package:checksums
              env:
                  CHECKSUM_FILE_NAME: ${{ steps.package_names.outputs.checksums }}
            - name: Configure Linux sandbox helper
              if: matrix.platform == 'linux'
              run: |
                  sudo chown root:root apps/desktop/release/linux-unpacked/chrome-sandbox
                  sudo chmod 4755 apps/desktop/release/linux-unpacked/chrome-sandbox
                  ls -l apps/desktop/release/linux-unpacked/chrome-sandbox
            - name: Smoke packaged app with emulators (Linux)
              if: matrix.platform == 'linux'
              run: |
                  xvfb-run --auto-servernum -- pnpm dlx firebase-tools@15.15.0 --project demo-local emulators:exec --only auth,firestore --config firebase/emulator/firebase.json "pnpm --filter @firebase-desk/emulator-tools seed && pnpm --filter @firebase-desk/e2e test:packaged"
            - name: Smoke packaged app with emulators (macOS)
              if: matrix.platform == 'macos'
              run: |
                  pnpm dlx firebase-tools@15.15.0 --project demo-local emulators:exec --only auth,firestore --config firebase/emulator/firebase.json "pnpm --filter @firebase-desk/emulator-tools seed && pnpm --filter @firebase-desk/e2e test:packaged"
            - name: Smoke packaged app with emulators (Windows)
              if: matrix.platform == 'windows'
              shell: bash
              run: |
                  pnpm dlx firebase-tools@15.15.0 --project demo-local emulators:exec --only auth,firestore --config firebase/emulator/firebase.json "pnpm --filter @firebase-desk/emulator-tools seed && pnpm --filter @firebase-desk/e2e test:packaged"
            - uses: actions/upload-artifact@v7
              with:
                  name: ${{ steps.package_names.outputs.artifact }}
                  path: |
                      apps/desktop/release/*.dmg
                      apps/desktop/release/*.zip
                      apps/desktop/release/*.exe
                      apps/desktop/release/*.AppImage
                      apps/desktop/release/*.deb
                      apps/desktop/release/SHA256SUMS*.txt
                  if-no-files-found: error
                  retention-days: ${{ needs.prepare.outputs.retention_days }}

    publish-latest:
        needs: [ prepare, package ]
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.prepare.outputs.should_package == 'true'
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.2
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v7
              with:
                  path: artifacts
            - name: Write release manifest
              run: pnpm release:manifest
              env:
                  RELEASE_ARTIFACTS_DIR: artifacts
                  RELEASE_CHANNEL: latest
                  RELEASE_MANIFEST_FILE: artifacts/release-manifest.json
                  RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/latest
            - name: Publish rolling prerelease
              env:
                  GH_TOKEN: ${{ github.token }}
                  ROLLING_RELEASE_TAG: latest
              run: |
                  cat > release-notes.md <<'NOTES'
                  Rolling unsigned build mirrored from the latest versioned `main` release.

                  These binaries are published intentionally for development smoke testing. They are unsigned, so OS warning prompts are expected. Verify downloads with the matching SHA256SUMS asset.
                  NOTES
                  echo "" >> release-notes.md
                  echo "Source commit: \`$GITHUB_SHA\`" >> release-notes.md

                  if gh release view "$ROLLING_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                    # Update the release target to the current commit (note: the git tag itself will not move)
                    gh release edit "$ROLLING_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --prerelease --title "$ROLLING_RELEASE_TAG" --notes-file release-notes.md --target "$GITHUB_SHA"
                  else
                    if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$ROLLING_RELEASE_TAG" >/dev/null 2>&1; then
                      echo "::error::Missing required rolling release tag '$ROLLING_RELEASE_TAG'. Create it once, then rerun this workflow."
                      exit 1
                    fi
                    gh release create "$ROLLING_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --prerelease --verify-tag --title "$ROLLING_RELEASE_TAG" --notes-file release-notes.md
                  fi
                  find artifacts -type f -print0 | xargs -0 -I {} gh release upload "$ROLLING_RELEASE_TAG" {} --repo "$GITHUB_REPOSITORY" --clobber

    publish-version:
        needs: [ prepare, package ]
        runs-on: ubuntu-latest
        if: >
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
            || (github.event_name == 'push' && github.ref == 'refs/heads/main'
            && needs.prepare.outputs.should_package == 'true')
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.2
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v7
              with:
                  path: artifacts
            - name: Write release manifest
              run: pnpm release:manifest
              env:
                  RELEASE_ARTIFACTS_DIR: artifacts
                  RELEASE_CHANNEL: ${{ needs.prepare.outputs.version_tag }}
                  RELEASE_MANIFEST_FILE: artifacts/release-manifest.json
                  RELEASE_TAG: ${{ needs.prepare.outputs.version_tag }}
                  RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.version_tag }}
            - name: Write package manager manifests
              run: pnpm package-managers:manifests
              env:
                  PACKAGE_MANAGER_MANIFEST_DIR: package-manager-manifests
                  RELEASE_MANIFEST_FILE: artifacts/release-manifest.json
                  RELEASE_TAG: ${{ needs.prepare.outputs.version_tag }}
            - uses: actions/upload-artifact@v7
              with:
                  name: package-manager-manifests-${{ needs.prepare.outputs.version_tag }}
                  path: package-manager-manifests
                  if-no-files-found: error
                  retention-days: 90
            - name: Ensure version tag
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
              run: |
                  if [ -z "$VERSION_TAG" ]; then
                    echo "::error::Missing version tag."
                    exit 1
                  fi

                  tag_ref="repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION_TAG"
                  if tag_json="$(gh api "$tag_ref" 2>/dev/null)"; then
                    tag_sha="$(printf '%s' "$tag_json" | jq -r '.object.sha')"
                    if [ "$tag_sha" != "$GITHUB_SHA" ]; then
                      echo "::error::Tag $VERSION_TAG points to $tag_sha, expected $GITHUB_SHA."
                      exit 1
                    fi
                    echo "Tag $VERSION_TAG already points to $GITHUB_SHA."
                  else
                    gh api "repos/$GITHUB_REPOSITORY/git/refs" \
                      -f ref="refs/tags/$VERSION_TAG" \
                      -f sha="$GITHUB_SHA" >/dev/null
                    echo "Created tag $VERSION_TAG at $GITHUB_SHA."
                  fi
            - name: Publish version release
              env:
                  GH_TOKEN: ${{ github.token }}
                  MARK_LATEST: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
                  VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
              run: |
                  cat > release-notes.md <<'NOTES'
                  Unsigned Firebase Desk build. OS warning prompts are expected. Verify downloads with the matching SHA256SUMS asset.
                  NOTES

                  latest_args=()
                  if [ "$MARK_LATEST" = "true" ]; then
                    latest_args=(--latest)
                  fi

                  if gh release view "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                    gh release edit "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" "${latest_args[@]}" --title "$VERSION_TAG" --notes-file release-notes.md
                  else
                    gh release create "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" "${latest_args[@]}" --verify-tag --title "$VERSION_TAG" --notes-file release-notes.md
                  fi
                  find artifacts -type f -print0 | xargs -0 -I {} gh release upload "$VERSION_TAG" {} --repo "$GITHUB_REPOSITORY" --clobber
